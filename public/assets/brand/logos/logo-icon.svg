<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .g { fill: #2563EB; }
    .ck { stroke: #10B981; }
    @media (prefers-color-scheme: dark) {
      .g { fill: #3B82F6; }
      .ck { stroke: #34D399; }
    }
  </style>
  <!--
    6-tooth gear: outer r=16, root r=12, center hole r=7
    Teeth at 0°, 60°, 120°, 180°, 240°, 300°
    Each tooth spans ±13° at outer radius; root arcs span 20° between teeth
    Coordinates computed from polar: x = 20 + r·cos(θ), y = 20 + r·sin(θ)
  -->
  <path class="g" fill-rule="evenodd" clip-rule="evenodd"
    d="
      M31.28 15.9 L35.59 16.4 L35.59 23.6 L31.28 24.1
      A12 12 0 0 1 29.19 27.72
      L30.91 31.7 L24.67 35.3 L22.09 31.82
      A12 12 0 0 1 17.91 31.82
      L15.33 35.3 L9.09 31.7 L10.81 27.72
      A12 12 0 0 1 8.72 24.1
      L4.41 23.6 L4.41 16.4 L8.72 15.9
      A12 12 0 0 1 10.81 12.28
      L9.09 8.3 L15.33 4.7 L17.91 8.18
      A12 12 0 0 1 22.09 8.18
      L24.67 4.7 L30.91 8.3 L29.19 12.28
      A12 12 0 0 1 31.28 15.9 Z
      M27 20 A7 7 0 0 0 13 20 A7 7 0 0 0 27 20 Z
    "
  />
  <!-- Checkmark inside center hole -->
  <path class="ck" d="M15 20.5L18.5 24L25 16"
    stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
